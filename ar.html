<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Лабубу AR</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>


<style>

body {
margin:0;
background:#fff7f0;
text-align:center;
font-family:Arial;
}


model-viewer {

width:100%;
height:80vh;

}


.button {

display:inline-block;

padding:20px 40px;

background:#ff7ac3;

color:white;

border-radius:40px;

font-size:25px;

text-decoration:none;

}

</style>

</head>


<body>


<h1>🧸 Лабубу</h1>


<model-viewer

src="./scene.glb"

ar

ar-modes="scene-viewer webxr quick-look"

camera-controls

auto-rotate

shadow-intensity="1"

ar-placement="floor">


</model-viewer>


<a class="button" href="index.html">

⬅ Назад

</a>


</body>

</html>
