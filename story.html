<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Привітання Лабубу</title>

<style>

body {
    margin: 0;
    background: black;
    font-family: Arial;
    overflow: hidden;
}

.video-box {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.button {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);

    background: white;
    color: black;

    padding: 18px 35px;
    border-radius: 50px;

    font-size: 24px;
    text-decoration: none;

    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

</style>

</head>


<body>


<div class="video-box">

<video controls autoplay>
<source src="Єві.mp4" type="video/mp4">
</video>

</div>


<a class="button" href="index.html">
⬅ Назад
</a>


</body>

</html>
