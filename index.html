<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Подарунок для хрещениці</title>


<style>


body {

margin:0;
padding:0;

height:100vh;

background:#fff7f0;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

font-family:Arial;

}


.container {

width:100%;

}


h1 {

font-size:38px;

}


img {

width:90%;

max-width:550px;

border-radius:25px;

}


h2 {

font-size:32px;

}


.button {


display:inline-block;


margin-top:25px;


padding:25px 60px;


background:#ff7ac3;


color:white;


font-size:32px;


font-weight:bold;


border-radius:60px;


text-decoration:none;


}


</style>


</head>



<body>


<div class="container">


<h1>🎂 З Днем Народження!</h1>



<img src="LOGO.jpg">



<h2>🧸 Пазлик вітає тебе!!!</h2>



<a class="button" href="story.html">

📖 Почати привітання

</a>


</div>



<audio id="music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener('load', function() {
    const music = document.getElementById('music');

    music.play().catch(function(error) {
        console.log("Автозапуск заблокований браузером:", error);
    });
});
</script>



</body>

</html>
